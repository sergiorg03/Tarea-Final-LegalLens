services:
  app_django:
    build:
      context: .
      dockerfile: app_django/Dockerfile
    ports:
      - "8000:8000"
    environment:
      POSTGRES_DB: legallens
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      API_URL: http://ai:8001/analizar
    env_file:
      - .env
    depends_on:
      - db
    command: [ "python", "app_django/manage.py", "runserver", "0.0.0.0:8000" ]

  ai:
    build:
      context: .
      dockerfile: AI/Dockerfile
    ports:
      - "8002:8001"
    env_file:
      - .env
    command: [ "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8001" ]

  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: legallens
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  nginx:
    image: nginx:latest
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - app_django
      - ai

volumes:
  postgres_data:
